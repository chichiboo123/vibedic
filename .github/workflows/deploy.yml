name: Deploy VibeDic to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build
        env:
          # 저장소 Settings > Secrets and variables > Actions > Repository secrets에
          # 이름 그대로 VITE_GEMINI_API_KEY를 등록하면 어시스턴트가 별도 키 입력 없이 바로 동작합니다.
          # 등록하지 않으면 사용자가 직접 키를 입력하는 방식으로 자동 폴백합니다.
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    # github-pages 환경은 GitHub가 자동으로 "default 브랜치(main)에서만 배포 허용" 규칙을 걸어둡니다.
    # main이 아닌 브랜치에서 workflow_dispatch로 잘못 실행해도 오류 대신 조용히 건너뜁니다.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
